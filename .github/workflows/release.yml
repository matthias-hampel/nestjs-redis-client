name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: "npm version bump (passed to `pnpm version <arg>`)"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      REDIS_URL: redis://127.0.0.1:6379
    services:
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (check only)
        run: pnpm run lint:ci

      - name: Unit tests
        run: pnpm run test

      - name: E2E tests
        run: pnpm run test:e2e

      - name: Build
        run: pnpm run build

      - name: Save release notes from HEAD commit
        run: git log -1 --pretty=%B > release-notes.md

      - name: Bump package version
        run: pnpm version ${{ inputs.version_bump }} --no-git-tag-version

      - name: Read new version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit version bump
        run: |
          git add package.json
          git commit -m "chore(release): v${{ steps.ver.outputs.version }}"

      - name: Tag release
        run: git tag -a "v${{ steps.ver.outputs.version }}" -m "v${{ steps.ver.outputs.version }}"

      - name: Push branch and tag
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "v${{ steps.ver.outputs.version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          gh release create "v${{ steps.ver.outputs.version }}"
          --repo "${{ github.repository }}"
          --title "v${{ steps.ver.outputs.version }}"
          --notes-file release-notes.md

      - name: Publish to npm (OIDC trusted publishing)
        run: |
          npm install -g npm@^11.5.1
          # Do not set NODE_AUTH_TOKEN — npm exchanges GitHub OIDC for a short-lived publish token.
          pnpm publish --access public --no-git-checks
